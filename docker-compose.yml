services:
  argus-api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - argus-data:/data
    environment:
      - ARGUS_DATABASE_URL=sqlite:////data/argus.db
      - ARGUS_JWT_SECRET=${ARGUS_JWT_SECRET:-changeme}
      - ARGUS_JWT_EXPIRY_HOURS=24
      - ARGUS_GOOGLE_API_KEY=${ARGUS_GOOGLE_API_KEY:-}
      - ARGUS_GEMINI_EVAL_MODEL=gemini-2.0-flash
      - ARGUS_USE_MOCK_CARDS=true
      - ARGUS_CORS_ORIGINS=https://argus-principia.vercel.app,https://34-16-41-18.sslip.io,http://localhost:3000,http://localhost:5173,http://localhost:5175
    restart: unless-stopped

volumes:
  argus-data:
