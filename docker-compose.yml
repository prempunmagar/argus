services:
  argus-api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - argus-data:/data
    environment:
      - ARGUS_DATABASE_URL=${ARGUS_DATABASE_URL}
      - ARGUS_CORS_ORIGINS=${ARGUS_CORS_ORIGINS}
      - ARGUS_JWT_SECRET=${ARGUS_JWT_SECRET}
      - ARGUS_GEMINI_EVAL_MODEL=${ARGUS_GEMINI_EVAL_MODEL}
      - ARGUS_USE_MOCK_CARDS=${ARGUS_USE_MOCK_CARDS}
      - ARGUS_GOOGLE_API_KEY=${ARGUS_GOOGLE_API_KEY}
    restart: unless-stopped

volumes:
  argus-data:
